<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Dishes</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
    <style type="text/css">
        body {
            width: 800px;
            margin: auto;
            font-family: Arial, sans-serif;
        }
        h1 {
            color: #333;
        }
        .actions {
            text-align: center;
        }
        .actions a, .actions form {
            display: inline-block;
            margin: 0 5px;
        }
        .add-button {
            margin: 20px 0;
        }
    </style>
</head>
<body>
<header>
    <h1>All Dishes</h1>
</header>
<main>
    <div class="add-button">
        <form method="get" action="/dishes/dish-form">
            <input type="submit" value="Add new dish">
        </form>
    </div>

    <div th:if="${dishes != null && dishes.size() > 0}">
        <table class="table table-striped table-bordered">
            <thead>
            <tr>
                <th>Dish ID</th>
                <th>Name</th>
                <th>Cuisine</th>
                <th>Preparation Time</th>
                <th>Preparation Date</th>
                <th>Chef</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="dish : ${dishes}">
                <td th:text="${dish.dishId}"></td>
                <td th:text="${dish.name}"></td>
                <td th:text="${dish.cuisine}"></td>
                <td th:text="${dish.preparationTime}"></td>
                <td th:text="${dish.preparationDate}"></td>
                <td th:text="${dish.chef != null ? dish.chef.firstName + ' ' + dish.chef.lastName : 'No chef assigned'}"></td>
                <td class="actions">
                    <a th:href="@{'/dishes/dish-form/{id}' (id=${dish.id})}">Edit</a>
                    <form th:action="@{'/dishes/delete/{id}' (id=${dish.id})}"
                          method="POST"
                          style="display: inline;">
                        <input type="submit"
                               value="Delete"
                               onclick="return confirm('Are you sure you want to delete this dish?')">
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div th:if="${dishes == null || dishes.size() == 0}">
        <p>No dishes available. Add a new dish to get started.</p>
    </div>
</main>
</body>
</html>
